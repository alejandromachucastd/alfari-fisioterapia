<header
  class="w-full border-b border-white/40 bg-white/70 backdrop-blur-xl transition-shadow duration-300"
  [class.shadow-[0_16px_50px_rgba(15,23,42,0.08)]]="isScrolled()"
>
  <div class="section-shell flex h-20 items-center justify-between gap-4">
    <a routerLink="/" class="flex min-w-0 items-center gap-3" aria-label="Ir al inicio de Alfari Fisioterapia">
      <img src="assets/logo-alfari.svg" alt="Logo Alfari Fisioterapia" class="h-16 w-auto shrink-0 sm:h-20" />
      <div class="hidden min-w-0 sm:block">
        <p class="truncate text-sm font-semibold tracking-[-0.03em] text-slate-950">Alfari</p>
        <p class="truncate text-xs uppercase tracking-[0.18em] text-slate-400">Fisioterapia</p>
      </div>
    </a>

    <nav class="hidden items-center gap-6 lg:flex" aria-label="Navegación principal de escritorio">
      <a
        routerLink="/"
        #homeActive="routerLinkActive"
        routerLinkActive=""
        [routerLinkActiveOptions]="{ exact: true }"
        [ngClass]="homeActive.isActive ? 'font-semibold text-[color:var(--color-primary)] after:scale-x-100' : ''"
        class="relative pb-2 text-sm font-medium text-slate-600 transition after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:origin-center after:scale-x-0 after:rounded-full after:bg-[color:var(--color-primary)] after:transition-transform after:duration-300 hover:text-slate-950 hover:after:scale-x-100"
      >Inicio</a>
      <a
        routerLink="/nosotros"
        #aboutActive="routerLinkActive"
        routerLinkActive=""
        [ngClass]="aboutActive.isActive ? 'font-semibold text-[color:var(--color-primary)] after:scale-x-100' : ''"
        class="relative pb-2 text-sm font-medium text-slate-600 transition after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:origin-center after:scale-x-0 after:rounded-full after:bg-[color:var(--color-primary)] after:transition-transform after:duration-300 hover:text-slate-950 hover:after:scale-x-100"
      >Nosotros</a>
      <a
        routerLink="/servicios"
        #servicesActive="routerLinkActive"
        routerLinkActive=""
        [ngClass]="servicesActive.isActive ? 'font-semibold text-[color:var(--color-primary)] after:scale-x-100' : ''"
        class="relative pb-2 text-sm font-medium text-slate-600 transition after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:origin-center after:scale-x-0 after:rounded-full after:bg-[color:var(--color-primary)] after:transition-transform after:duration-300 hover:text-slate-950 hover:after:scale-x-100"
      >Servicios</a>
      <a
        routerLink="/convenios"
        #agreementsActive="routerLinkActive"
        routerLinkActive=""
        [ngClass]="agreementsActive.isActive ? 'font-semibold text-[color:var(--color-primary)] after:scale-x-100' : ''"
        class="relative pb-2 text-sm font-medium text-slate-600 transition after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:origin-center after:scale-x-0 after:rounded-full after:bg-[color:var(--color-primary)] after:transition-transform after:duration-300 hover:text-slate-950 hover:after:scale-x-100"
      >Convenios</a>
      <a
        routerLink="/contacto"
        #contactActive="routerLinkActive"
        routerLinkActive=""
        [ngClass]="contactActive.isActive ? 'font-semibold text-[color:var(--color-primary)] after:scale-x-100' : ''"
        class="relative pb-2 text-sm font-medium text-slate-600 transition after:absolute after:bottom-0 after:left-0 after:h-0.5 after:w-full after:origin-center after:scale-x-0 after:rounded-full after:bg-[color:var(--color-primary)] after:transition-transform after:duration-300 hover:text-slate-950 hover:after:scale-x-100"
      >Contacto</a>
    </nav>

    <div class="hidden items-center gap-3 lg:flex">
      <div class="flex items-center gap-2 rounded-full border border-slate-200 bg-white/80 px-2 py-2 shadow-sm">
        <a href="https://instagram.com" target="_blank" rel="noreferrer" aria-label="Instagram de Alfari" class="grid h-9 w-9 place-items-center rounded-full text-slate-500 transition hover:bg-slate-100 hover:text-[color:var(--color-primary)]">
          <svg class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect>
            <circle cx="12" cy="12" r="3.7"></circle>
            <circle cx="17.3" cy="6.7" r="0.9" fill="currentColor" stroke="none"></circle>
          </svg>
        </a>
        <a href="https://facebook.com" target="_blank" rel="noreferrer" aria-label="Facebook de Alfari" class="grid h-9 w-9 place-items-center rounded-full text-slate-500 transition hover:bg-slate-100 hover:text-[color:var(--color-primary)]">
          <svg class="h-4.5 w-4.5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M13.5 21v-7h2.3l.4-2.8h-2.7V9.4c0-.8.2-1.4 1.4-1.4H16V5.5c-.4 0-1.2-.1-2.2-.1-2.2 0-3.8 1.3-3.8 4v2H7.7V14H10v7h3.5Z"></path>
          </svg>
        </a>
      </div>

      <a class="btn-primary" routerLink="/contacto" fragment="agendar">
        Agendar cita
        <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l5 5a1 1 0 010 1.414l-5 5a1 1 0 11-1.414-1.414L13.586 11H4a1 1 0 110-2h9.586l-3.293-3.293a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
      </a>
    </div>

    <button
      class="relative inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-900 transition duration-300 ease-out hover:border-slate-300 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-sky-200 lg:hidden"
      [class.bg-slate-950]="isMenuOpen()"
      [class.border-slate-950]="isMenuOpen()"
      [class.text-white]="isMenuOpen()"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Abrir menú de navegación"
    >
      <span
        class="absolute h-0.5 w-5 rounded-full bg-current transition-all duration-300 ease-out"
        [ngClass]="isMenuOpen() ? 'translate-y-0 rotate-45' : '-translate-y-1.5'"
      ></span>
      <span
        class="absolute h-0.5 w-5 rounded-full bg-current transition-all duration-300 ease-out"
        [ngClass]="isMenuOpen() ? 'opacity-0' : 'opacity-100'"
      ></span>
      <span
        class="absolute h-0.5 w-5 rounded-full bg-current transition-all duration-300 ease-out"
        [ngClass]="isMenuOpen() ? 'translate-y-0 -rotate-45' : 'translate-y-1.5'"
      ></span>
    </button>
  </div>

  <aside
    class="fixed inset-0 z-[9999] flex h-[100dvh] min-h-[100dvh] w-screen max-w-none translate-x-full flex-col overflow-x-hidden overflow-y-auto bg-white px-5 pb-8 pt-24 transition duration-300 ease-out sm:px-6 lg:hidden"
    [class.translate-x-0]="isMenuOpen()"
    [class.translate-x-full]="!isMenuOpen()"
    aria-label="Menú móvil de Alfari"
  >
    <button
      type="button"
      (click)="closeMenu()"
      class="fixed right-4 top-4 z-[10000] inline-flex h-11 w-11 items-center justify-center rounded-full border border-slate-200 bg-slate-950 text-white transition duration-300 ease-out hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-sky-200"
      aria-label="Cerrar menú"
    >
      <svg class="h-5 w-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <path d="M5 5l10 10M15 5L5 15" stroke-linecap="round"></path>
      </svg>
    </button>

    <div class="mb-8 flex items-center border-b border-slate-200 pb-5">
      <div class="flex min-w-0 items-center gap-3 pr-14">
        <img src="assets/logo-alfari.svg" alt="Logo Alfari Fisioterapia" class="h-14 w-auto shrink-0 sm:h-16" />
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold tracking-[-0.03em] text-slate-950">Alfari</p>
          <p class="truncate text-xs uppercase tracking-[0.18em] text-slate-400">Fisioterapia</p>
        </div>
      </div>
    </div>

    <div class="mb-6 text-center">
      <p class="eyebrow justify-center">Menú</p>
      <p class="mt-3 text-sm leading-7 text-slate-500">Explora Alfari y agenda tu cita desde cualquier sección.</p>
    </div>

    <nav class="grid flex-1 content-center gap-3" aria-label="Navegación principal móvil">
      <a routerLink="/" routerLinkActive="border-[color:var(--color-primary)] bg-slate-50 text-[color:var(--color-primary)] shadow-sm" [routerLinkActiveOptions]="{ exact: true }" class="mx-auto w-full max-w-md rounded-2xl border border-transparent px-4 py-3 text-center text-2xl font-semibold tracking-[-0.04em] text-slate-950 transition hover:border-slate-200 hover:bg-slate-50" (click)="closeMenu()">Inicio</a>
      <a routerLink="/nosotros" routerLinkActive="border-[color:var(--color-primary)] bg-slate-50 text-[color:var(--color-primary)] shadow-sm" class="mx-auto w-full max-w-md rounded-2xl border border-transparent px-4 py-3 text-center text-2xl font-semibold tracking-[-0.04em] text-slate-950 transition hover:border-slate-200 hover:bg-slate-50" (click)="closeMenu()">Nosotros</a>
      <a routerLink="/servicios" routerLinkActive="border-[color:var(--color-primary)] bg-slate-50 text-[color:var(--color-primary)] shadow-sm" class="mx-auto w-full max-w-md rounded-2xl border border-transparent px-4 py-3 text-center text-2xl font-semibold tracking-[-0.04em] text-slate-950 transition hover:border-slate-200 hover:bg-slate-50" (click)="closeMenu()">Servicios</a>
      <a routerLink="/convenios" routerLinkActive="border-[color:var(--color-primary)] bg-slate-50 text-[color:var(--color-primary)] shadow-sm" class="mx-auto w-full max-w-md rounded-2xl border border-transparent px-4 py-3 text-center text-2xl font-semibold tracking-[-0.04em] text-slate-950 transition hover:border-slate-200 hover:bg-slate-50" (click)="closeMenu()">Convenios</a>
      <a routerLink="/contacto" routerLinkActive="border-[color:var(--color-primary)] bg-slate-50 text-[color:var(--color-primary)] shadow-sm" class="mx-auto w-full max-w-md rounded-2xl border border-transparent px-4 py-3 text-center text-2xl font-semibold tracking-[-0.04em] text-slate-950 transition hover:border-slate-200 hover:bg-slate-50" (click)="closeMenu()">Contacto</a>
    </nav>

    <div class="grid justify-items-center gap-5 border-t border-slate-200 pt-6">
      <a class="btn-primary w-full max-w-sm justify-center" routerLink="/contacto" fragment="agendar" (click)="closeMenu()">
        Agendar cita
      </a>

      <div class="flex items-center justify-center gap-3">
        <a href="https://instagram.com" target="_blank" rel="noreferrer" aria-label="Instagram de Alfari" class="grid h-11 w-11 place-items-center rounded-full border border-slate-200 bg-white text-slate-600 transition hover:bg-slate-50 hover:text-[color:var(--color-primary)]">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect>
            <circle cx="12" cy="12" r="3.7"></circle>
            <circle cx="17.3" cy="6.7" r="0.9" fill="currentColor" stroke="none"></circle>
          </svg>
        </a>
        <a href="https://facebook.com" target="_blank" rel="noreferrer" aria-label="Facebook de Alfari" class="grid h-11 w-11 place-items-center rounded-full border border-slate-200 bg-white text-slate-600 transition hover:bg-slate-50 hover:text-[color:var(--color-primary)]">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M13.5 21v-7h2.3l.4-2.8h-2.7V9.4c0-.8.2-1.4 1.4-1.4H16V5.5c-.4 0-1.2-.1-2.2-.1-2.2 0-3.8 1.3-3.8 4v2H7.7V14H10v7h3.5Z"></path>
          </svg>
        </a>
      </div>
    </div>
  </aside>
</header>
