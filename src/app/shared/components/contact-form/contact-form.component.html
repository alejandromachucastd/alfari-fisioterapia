<section class="panel grid gap-6 p-6 sm:p-8">
  <div class="grid gap-3">
    <span class="eyebrow">{{ eyebrow }}</span>
    <h2 class="text-3xl font-semibold tracking-[-0.04em] text-slate-950 sm:text-4xl">{{ title }}</h2>
    <p class="text-sm leading-7 text-slate-500">{{ subtitle }}</p>
  </div>

  @if (submitted()) {
    <div class="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-4 text-sm font-medium text-emerald-700" role="status" aria-live="polite">
      {{ successMessage }}
    </div>
  }

  <form class="grid gap-4 sm:grid-cols-2" [formGroup]="form" (ngSubmit)="onSubmit()">
    <label class="grid gap-2 text-sm font-medium text-slate-700">
      Nombre
      <input class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-[color:var(--color-secondary)] focus:ring-4 focus:ring-cyan-100" type="text" formControlName="name" aria-label="Nombre" />
    </label>

    @if (isAppointment()) {
      <label class="grid gap-2 text-sm font-medium text-slate-700">
        Tipo de servicio
        <select class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-[color:var(--color-secondary)] focus:ring-4 focus:ring-cyan-100" formControlName="service" aria-label="Tipo de servicio">
          <option value="">Selecciona un servicio</option>
          <option value="rehabilitacion-fisica">Rehabilitación física</option>
          <option value="fisioterapia-deportiva">Fisioterapia deportiva</option>
          <option value="terapia-manual">Terapia manual</option>
          <option value="ergonomia-laboral">Ergonomía laboral</option>
        </select>
      </label>
    } @else {
      <label class="grid gap-2 text-sm font-medium text-slate-700">
        Empresa
        <input class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-[color:var(--color-secondary)] focus:ring-4 focus:ring-cyan-100" type="text" formControlName="company" aria-label="Empresa" />
      </label>
    }

    <label class="grid gap-2 text-sm font-medium text-slate-700">
      Teléfono
      <input class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-[color:var(--color-secondary)] focus:ring-4 focus:ring-cyan-100" type="tel" formControlName="phone" aria-label="Teléfono" />
    </label>

    <label class="grid gap-2 text-sm font-medium text-slate-700">
      Email
      <input class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-[color:var(--color-secondary)] focus:ring-4 focus:ring-cyan-100" type="email" formControlName="email" aria-label="Email" />
    </label>

    @if (isAppointment()) {
      <label class="grid gap-2 text-sm font-medium text-slate-700">
        Fecha
        <input class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-[color:var(--color-secondary)] focus:ring-4 focus:ring-cyan-100" type="date" formControlName="date" aria-label="Fecha" />
      </label>

      <label class="grid gap-2 text-sm font-medium text-slate-700">
        Hora
        <input class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-[color:var(--color-secondary)] focus:ring-4 focus:ring-cyan-100" type="time" formControlName="time" aria-label="Hora" />
      </label>

      <label class="grid gap-2 text-sm font-medium text-slate-700 sm:col-span-2">
        Motivo de consulta
        <input class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-[color:var(--color-secondary)] focus:ring-4 focus:ring-cyan-100" type="text" formControlName="company" aria-label="Motivo de consulta" />
      </label>
    }

    <label class="grid gap-2 text-sm font-medium text-slate-700 sm:col-span-2">
      Mensaje
      <textarea class="min-h-32 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-[color:var(--color-secondary)] focus:ring-4 focus:ring-cyan-100" rows="5" formControlName="message" aria-label="Mensaje"></textarea>
    </label>

    <button class="btn-primary sm:col-span-2" type="submit">
      {{ submitLabel }}
      <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l5 5a1 1 0 010 1.414l-5 5a1 1 0 11-1.414-1.414L13.586 11H4a1 1 0 110-2h9.586l-3.293-3.293a1 1 0 010-1.414z" clip-rule="evenodd" />
      </svg>
    </button>
  </form>
</section>
