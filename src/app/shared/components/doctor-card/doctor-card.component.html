<article class="panel flex h-full flex-col overflow-hidden">
  <img [ngSrc]="doctor.image" [alt]="doctor.name" width="480" height="360" class="h-72 w-full object-cover" loading="lazy" />
  <div class="grid grow gap-3 p-6">
    <div class="grid gap-1">
      <h3 class="text-xl font-semibold tracking-[-0.03em] text-slate-900">{{ doctor.name }}</h3>
      <p class="text-sm font-semibold text-[color:var(--color-secondary)]">{{ doctor.specialty }}</p>
    </div>
    <p class="text-sm leading-7 text-slate-500">{{ doctor.bio }}</p>
  </div>
</article>
