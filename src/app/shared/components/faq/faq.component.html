<div class="grid gap-4">
  @for (item of items; track item.question) {
    <details class="panel group overflow-hidden p-0">
      <summary class="flex cursor-pointer list-none items-center justify-between gap-4 px-6 py-5 text-left text-base font-semibold text-slate-900">
        <span>{{ item.question }}</span>
        <span class="grid h-8 w-8 place-items-center rounded-full bg-slate-100 text-slate-500 transition group-open:rotate-45 group-open:bg-[color:var(--color-primary)] group-open:text-white">+</span>
      </summary>
      <div class="px-6 pb-5">
        <p class="max-w-3xl text-sm leading-7 text-slate-500">{{ item.answer }}</p>
      </div>
    </details>
  }
</div>
