<button
  type="button"
  class="fixed bottom-5 right-5 z-40 inline-flex h-14 w-14 items-center justify-center rounded-full border border-slate-200 bg-white text-[color:var(--color-primary)] shadow-[0_18px_40px_rgba(15,23,42,0.16)] transition-all duration-300 hover:-translate-y-1 hover:border-slate-300 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-sky-200"
  [class.pointer-events-none]="!isVisible()"
  [class.translate-y-4]="!isVisible()"
  [class.opacity-0]="!isVisible()"
  [class.opacity-100]="isVisible()"
  (click)="scrollToTop()"
  aria-label="Volver arriba"
>
  <svg class="h-5 w-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
    <path d="M10 15V5M10 5 6 9M10 5l4 4" stroke-linecap="round" stroke-linejoin="round"></path>
  </svg>
</button>
