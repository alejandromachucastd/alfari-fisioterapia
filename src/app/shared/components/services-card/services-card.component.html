<article class="group panel flex h-full flex-col overflow-hidden">
  <div class="relative overflow-hidden">
    <img [src]="service.image" [alt]="service.title" class="h-52 w-full object-cover transition duration-500 group-hover:scale-105" />
    <div class="absolute inset-0 bg-gradient-to-t from-slate-950/65 via-slate-950/10 to-transparent"></div>
    <span class="absolute left-5 top-5 rounded-full bg-white/90 px-3 py-1 text-xs font-semibold text-slate-900">{{ service.tag }}</span>
    <div class="absolute inset-x-5 bottom-5">
      <h3 class="text-2xl font-semibold tracking-[-0.04em] text-white">{{ service.title }}</h3>
    </div>
  </div>

  <div class="grid grow gap-5 p-6">
    <p class="text-sm leading-7 text-slate-500">{{ service.shortDescription }}</p>

    <ul class="grid min-h-24 gap-2 text-sm text-slate-600">
      @for (benefit of service.benefits; track benefit) {
        <li class="flex items-start gap-3">
          <span class="mt-1 h-2 w-2 rounded-full bg-[color:var(--color-secondary)]"></span>
          <span>{{ benefit }}</span>
        </li>
      }
    </ul>

    <div class="mt-auto flex flex-col gap-3 sm:flex-row">
      <a class="btn-secondary flex-1" [routerLink]="['/servicios', service.slug]">Ver detalle</a>
      <a class="btn-primary flex-1" routerLink="/contacto" fragment="agendar">Agendar</a>
    </div>
  </div>
</article>
