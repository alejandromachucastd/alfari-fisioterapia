<section class="py-16 sm:py-20">
  <div class="section-shell">
    <div class="grid gap-8 lg:grid-cols-[0.95fr_1.05fr] lg:items-center">
      <div class="grid gap-5">
        <span class="eyebrow">Servicios</span>
        <h1 class="section-title">Servicios diseñados para pacientes, deporte y empresas.</h1>
        <p class="section-copy">Cada servicio se presenta como producto digital: visual, entendible y con CTA directo.</p>
      </div>
      <div class="panel overflow-hidden p-3">
        <img src="https://images.unsplash.com/photo-1519824145371-296894a0daa9?auto=format&fit=crop&w=1400&q=80" alt="Sesión de rehabilitación física" class="h-[26rem] w-full rounded-[24px] object-cover" />
      </div>
    </div>
  </div>
</section>

<section class="py-20">
  <div class="section-shell grid gap-5 md:grid-cols-2 xl:grid-cols-3">
    @for (service of services; track service.slug) {
      <app-services-card [service]="service" />
    }
  </div>
</section>

<section class="pb-20">
  <div class="section-shell">
    <div class="panel flex flex-col gap-6 p-8 lg:flex-row lg:items-center lg:justify-between">
      <div class="grid gap-3">
        <span class="eyebrow">Atención inmediata</span>
        <h2 class="text-3xl font-semibold tracking-[-0.04em] text-slate-950">Si ya sabes lo que necesitas, agenda hoy.</h2>
      </div>
      <a class="btn-primary w-full sm:w-fit" routerLink="/contacto" fragment="agendar">Agendar cita</a>
    </div>
  </div>
</section>
